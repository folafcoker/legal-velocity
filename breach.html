<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLA Breach Analysis — Granola</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --txt:    #111;
  --txt-2:  #888;
  --txt-3:  #bbb;
  --line:   #ebebeb;
  --sub-bg: #fafafa;
  --good:   #16a34a;
  --warn:   #ca8a04;
  --bad:    #dc2626;
  --font:   'Inter', sans-serif;
  --mono:   'Fira Code', monospace;
}

html, body {
  font-family: var(--font);
  background: #fff;
  color: var(--txt);
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
}

.page {
  max-width: 740px;
  margin: 0 auto;
  padding: 48px 24px 80px;
}

/* ── Nav ─────────────────── */
.nav-back {
  margin-bottom: 32px;
}
.nav-back a {
  font-size: 12px;
  color: var(--txt-3);
  text-decoration: none;
  transition: color 0.1s;
}
.nav-back a:hover { color: var(--txt); }

/* ── Header ─────────────── */
.page-header { margin-bottom: 28px; }
.page-header h1 { font-size: 15px; font-weight: 500; letter-spacing: -0.2px; }
.page-header p  { font-size: 12px; color: var(--txt-2); margin-top: 4px; line-height: 1.5; }

/* ── Stat chips ─────────── */
.stat-row {
  display: flex; gap: 12px; flex-wrap: wrap;
  margin-bottom: 36px;
}
.stat-card {
  background: var(--sub-bg);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px 16px;
  min-width: 130px;
}
.stat-val {
  font-family: var(--mono);
  font-size: 22px; font-weight: 400;
  letter-spacing: -0.5px; line-height: 1;
  color: var(--txt);
}
.stat-val.red  { color: var(--bad); }
.stat-val.warn { color: var(--warn); }
.stat-label {
  font-size: 11px; color: var(--txt-3);
  margin-top: 5px; line-height: 1.4;
}

/* ── Section ─────────────── */
.section { margin-bottom: 40px; }
.section-label {
  font-size: 11px; font-weight: 500;
  color: var(--txt-3); letter-spacing: 0.3px;
  text-transform: uppercase;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line);
}

/* ── Chart ───────────────── */
.chart-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.chart-wrap svg { display: block; }

/* ── Breach list ──────────── */
.breach-item {
  border-bottom: 1px solid var(--line);
  padding: 14px 0;
}
.breach-item:last-child { border-bottom: none; }

.breach-top {
  display: grid;
  grid-template-columns: 1fr 90px 90px 70px;
  align-items: start;
  gap: 8px;
}

.breach-name { font-size: 13px; font-weight: 500; }
.breach-sub  { font-size: 11.5px; color: var(--txt-2); margin-top: 2px; }

.breach-ts {
  font-family: var(--mono); font-size: 11px;
  color: var(--txt-2); text-align: right;
  display: block; line-height: 1.6;
}
.breach-ts-label { font-size: 10px; color: var(--txt-3); text-align: right; display: block; }

.dur-badge {
  text-align: right;
}
.dur-num {
  font-family: var(--mono); font-size: 20px;
  font-weight: 400; letter-spacing: -0.5px;
  color: var(--bad); line-height: 1;
}
.dur-num.warn { color: var(--warn); }
.dur-unit { font-family: var(--mono); font-size: 11px; color: var(--txt-3); }
.dur-hours { font-family: var(--mono); font-size: 10px; color: var(--txt-3); display: block; margin-top: 1px; }

/* ── Nudges ──────────────── */
.nudge-list {
  margin-top: 10px;
  background: var(--sub-bg);
  border-radius: 6px;
  padding: 2px 0;
}
.nudge-item {
  display: grid;
  grid-template-columns: 72px 58px 1fr;
  align-items: baseline;
  gap: 8px;
  padding: 7px 12px;
  border-bottom: 1px solid var(--line);
  font-size: 11.5px;
}
.nudge-item:last-child { border-bottom: none; }
.nudge-dt   { font-family: var(--mono); font-size: 10.5px; color: var(--txt-3); }
.nudge-who  { font-weight: 500; color: var(--txt); }
.nudge-note { color: var(--txt-2); line-height: 1.45; }
.nudge-tag {
  display: inline-block;
  font-size: 10px; font-weight: 500;
  padding: 1px 6px; border-radius: 8px;
  margin-right: 5px; vertical-align: middle;
  white-space: nowrap;
}
.nudge-tag.prio  { background: #fef3c7; color: #92400e; }
.nudge-tag.guide { background: #ede9fe; color: #5b21b6; }
.nudge-tag.call  { background: #dcfce7; color: #166534; }
.nudge-tag.other { background: #f1f5f9; color: #475569; }

.no-nudges { font-size: 11px; color: var(--txt-3); margin-top: 8px; }

.col-headers {
  display: grid;
  grid-template-columns: 1fr 90px 90px 70px;
  gap: 8px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line);
  font-size: 11px; font-weight: 500;
  color: var(--txt-3); letter-spacing: 0.2px;
  margin-bottom: 0;
}
.col-headers span:not(:first-child) { text-align: right; }

.loading { color: var(--txt-3); font-size: 12px; padding: 24px 0; }

/* ── Modal ───────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.25);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-panel {
  background: #fff;
  border-radius: 10px;
  width: min(520px, 92vw);
  max-height: 78vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 8px 40px rgba(0,0,0,0.13);
  overflow: hidden;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 20px 13px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.modal-title { font-size: 13px; font-weight: 500; letter-spacing: -0.1px; }
.modal-close {
  background: none; border: none; cursor: pointer;
  font-size: 16px; color: var(--txt-3); line-height: 1;
  padding: 0 0 0 12px;
}
.modal-close:hover { color: var(--txt); }
.modal-body { overflow-y: auto; padding: 4px 0 12px; }
.modal-row {
  padding: 13px 20px;
  border-bottom: 1px solid var(--line);
}
.modal-row:last-child { border-bottom: none; }
.modal-row-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 3px;
}
.modal-name   { font-size: 13px; font-weight: 500; }
.modal-dur    { font-family: var(--mono); font-size: 11px; color: var(--bad); white-space: nowrap; }
.modal-meta   { font-size: 11px; color: var(--txt-3); margin-bottom: 8px; }
.modal-nudge-list { margin-top: 8px; background: var(--sub-bg); border-radius: 6px; padding: 2px 0; }
.modal-nudge {
  display: grid;
  grid-template-columns: 72px 58px 1fr;
  gap: 8px;
  padding: 7px 12px;
  border-bottom: 1px solid var(--line);
  font-size: 11.5px;
  align-items: baseline;
}
.modal-nudge:last-child { border-bottom: none; }
.modal-no-nudge { font-size: 11px; color: var(--txt-3); margin-top: 4px; }
</style>
</head>

const SLA_HOURS = 48;

function weekStart(dateStr) {
  const d = new Date(dateStr + 'T00:00:00Z');
  const day = d.getUTCDay();
  d.setUTCDate(d.getUTCDate() - (day === 0 ? 6 : day - 1));
  return d;
}

const US_HOLIDAYS = new Set([
  '2026-01-01','2026-01-19','2026-02-16','2026-05-25','2026-06-19',
  '2026-07-03','2026-09-07','2026-10-12','2026-11-11','2026-11-26','2026-12-25',
]);
function isBusinessDay(ms) {
  const d = new Date(ms), dow = d.getUTCDay();
  return dow !== 0 && dow !== 6 && !US_HOLIDAYS.has(d.toISOString().slice(0,10));
}
function businessHoursBetween(startMs, endMs) {
  if (endMs <= startMs) return 0;
  const MS_DAY = 86400000;
  let bh = 0, dayStart = Math.floor(startMs / MS_DAY) * MS_DAY;
  while (dayStart < endMs) {
    if (isBusinessDay(dayStart)) {
      const lo = Math.max(startMs, dayStart), hi = Math.min(endMs, dayStart + MS_DAY);
      if (hi > lo) bh += (hi - lo) / 3600000;
    }
    dayStart += MS_DAY;
  }
  return bh;
}
function parseTs(s) {
  if (!s) return null;
  try { return new Date(s + " 2026"); } catch(e) { return null; }
}
function hoursBetweenTs(sentAt, returnedAt) {
  const a = parseTs(sentAt), b = parseTs(returnedAt);
  return (a && b) ? businessHoursBetween(a.getTime(), b.getTime()) : null;
}
function durationFor(turn) {
  if (!turn.returnedDate) return null;
  const hrs = hoursBetweenTs(turn.sentAt, turn.returnedAt);
  if (hrs !== null && hrs >= 0) {
    return { d: Math.floor(hrs/24), h: Math.round(hrs%24), totalH: Math.round(hrs) };
  }
  const startMs = new Date(turn.sentToElaine).getTime();
  const endMs   = new Date(turn.returnedDate).getTime();
  const bh = businessHoursBetween(startMs, endMs);
  const d  = Math.round(bh / 24);
  return { d, h: null, totalH: d * 24 };
}

function requestsForTurn(contractName, sentAt, returnedAt) {
  const tStart = parseTs(sentAt);
  const tEnd   = returnedAt ? parseTs(returnedAt) : new Date(32503680000000);
  if (!tStart) return [];
  const cLower = contractName.toLowerCase();
  return REQUESTS.filter(r => {
    if (!r.contracts.some(cn => cn.toLowerCase() === cLower)) return false;
    const rDt = parseTs(r.dt);
    return rDt && rDt >= tStart && rDt <= tEnd;
  });
}

function tagClass(type) {
  if (/prioriti/i.test(type)) return 'prio';
  if (/guidance/i.test(type)) return 'guide';
  if (/legal call/i.test(type)) return 'call';
  return 'other';
}
function tagLabel(type) {
  if (/prioriti/i.test(type)) return 'Chase';
  if (/guidance/i.test(type)) return 'Guidance';
  if (/legal call/i.test(type)) return 'Call';
  return type;
}

// ─────────────────────────────────────────────────────
//  WoW chart  —  vertical columns, x = week, y = count
// ─────────────────────────────────────────────────────
let _wowBreaches = [];

function renderWoWChart(breaches) {
  _wowBreaches = breaches;

  const PAD_LEFT   = 36;
  const PAD_RIGHT  = 12;
  const PAD_TOP    = 10;
  const PAD_BOT    = 44;
  const BAR_AREA_H = 140;
  const COL_W      = 44;

  const cutoff  = new Date('2026-01-19T00:00:00Z');
  const endDate = new Date('2026-04-21T00:00:00Z');

  const weekMap = new Map();
  breaches.forEach(b => {
    const d = new Date(b.turn.sentToElaine + 'T00:00:00Z');
    if (d < cutoff) return;
    const ws  = weekStart(b.turn.sentToElaine);
    const key = ws.toISOString().slice(0, 10);
    weekMap.set(key, (weekMap.get(key) || 0) + 1);
  });

  const weeks = [];
  let w = weekStart('2026-01-19');
  while (w <= endDate) {
    const key   = w.toISOString().slice(0, 10);
    const label = w.toLocaleString('en-GB', { day: 'numeric', month: 'short', timeZone: 'UTC' });
    weeks.push({ key, label, count: weekMap.get(key) || 0 });
    const next = new Date(w); next.setUTCDate(next.getUTCDate() + 7); w = next;
  }

  const maxCount = Math.max(...weeks.map(wk => wk.count), 1);
  const totalW   = PAD_LEFT + weeks.length * COL_W + PAD_RIGHT;
  const totalH   = PAD_TOP + BAR_AREA_H + PAD_BOT;
  const baseY    = PAD_TOP + BAR_AREA_H;

  function yFor(n) { return baseY - (n / maxCount) * BAR_AREA_H; }

  const yTicks = [];
  for (let t = 0; t <= maxCount; t++) yTicks.push(t);
  const gridLines = yTicks.map(t => {
    const y = yFor(t);
    return `<line x1="${PAD_LEFT}" y1="${y}" x2="${PAD_LEFT + weeks.length * COL_W}" y2="${y}"
      stroke="${t === 0 ? '#ccc' : '#f0f0f0'}" stroke-width="1"/>
      <text x="${PAD_LEFT - 5}" y="${y + 4}" text-anchor="end"
        font-family="'Fira Code', monospace" font-size="9" fill="#ccc">${t}</text>`;
  }).join('');

  const BAR_W = Math.round(COL_W * 0.55);
  const cols = weeks.map((wk, i) => {
    const cx    = PAD_LEFT + i * COL_W + COL_W / 2;
    const barH  = (wk.count / maxCount) * BAR_AREA_H;
    const barX  = cx - BAR_W / 2;
    const barY  = baseY - barH;
    const clickable = wk.count > 0;
    const safeKey   = wk.key.replace(/'/g, '');
    const safeLabel = wk.label.replace(/'/g, '');
    return `
      <g ${clickable ? `onclick="openWeekModal('${safeKey}','${safeLabel}')" style="cursor:pointer"` : ''}>
        ${clickable
          ? `<rect x="${barX}" y="${barY}" width="${BAR_W}" height="${barH}" rx="2"
               fill="#ca8a04" opacity="0.85"/>
             <rect x="${PAD_LEFT + i * COL_W}" y="${PAD_TOP}" width="${COL_W}" height="${BAR_AREA_H}"
               fill="transparent"/>
             <text x="${cx}" y="${barY - 4}" text-anchor="middle"
               font-family="'Fira Code', monospace" font-size="9" fill="#ca8a04">${wk.count}</text>`
          : ''
        }
        <text x="${cx}" y="${baseY + 14}" text-anchor="end"
          transform="rotate(-45, ${cx}, ${baseY + 14})"
          font-family="'Inter', sans-serif" font-size="9.5" fill="#bbb">${wk.label}</text>
      </g>`;
  }).join('');

  const svg = `<svg width="${totalW}" height="${totalH}" xmlns="http://www.w3.org/2000/svg">
    ${gridLines}
    ${cols}
  </svg>`;

  document.getElementById('wow-chart').innerHTML = svg;
}

// ─────────────────────────────────────────────────────
//  Week modal
// ─────────────────────────────────────────────────────
function openWeekModal(weekKey, weekLabel) {
  const weekBreaches = _wowBreaches.filter(b => {
    const ws = weekStart(b.turn.sentToElaine);
    return ws.toISOString().slice(0, 10) === weekKey;
  });

  document.getElementById('modal-title').textContent =
    `Week of ${weekLabel} — ${weekBreaches.length} breach${weekBreaches.length !== 1 ? 'es' : ''}`;

  document.getElementById('modal-body').innerHTML = weekBreaches.map(b => {
    const sentBy = b.turn.sentBy || '—';
    const nudges = requestsForTurn(b.contract.name, b.turn.sentAt, b.turn.returnedAt);
    const nudgesHTML = nudges.length
      ? `<div class="modal-nudge-list">${nudges.map(n =>
          `<div class="modal-nudge">
            <span class="nudge-dt">${n.dt}</span>
            <span class="nudge-who">${n.requester}</span>
            <span class="nudge-note">
              <span class="nudge-tag ${tagClass(n.type)}">${tagLabel(n.type)}</span>${n.note}
            </span>
          </div>`).join('')}</div>`
      : `<div class="modal-no-nudge">No Slack nudges logged</div>`;

    return `<div class="modal-row">
      <div class="modal-row-top">
        <span class="modal-name">${b.contract.name}
          <span style="font-size:10px;font-weight:400;color:var(--txt-3);margin-left:5px">Turn ${b.turnIdx + 1}</span>
        </span>
        <span class="modal-dur">${b.dur.totalH}h</span>
      </div>
      <div class="modal-meta">Sent by ${sentBy} · ${b.turn.sentAt || b.turn.sentToElaine}</div>
      ${nudgesHTML}
    </div>`;
  }).join('');

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

// ─────────────────────────────────────────────────────
function renderChart(breaches) {
  const LABEL_W = 152;  // y-axis: company names
  const BAR_W   = 480;  // x-axis: hours
  const ROW_H   = 30;
  const BAR_H   = 13;
  const PAD_TOP = 28;   // room for SLA label inside SVG above bars
  const PAD_BOT = 22;   // x-axis tick labels

  if (!breaches.length) {
    document.getElementById('chart').innerHTML = '<div class="loading">No breach data.</div>';
    return;
  }

  const maxH    = Math.max(...breaches.map(b => b.dur.totalH), SLA_HOURS * 1.1);
  const axisMax = Math.ceil(maxH / 24) * 24;
  const totalW  = LABEL_W + BAR_W + 50;
  const totalH  = PAD_TOP + breaches.length * ROW_H + PAD_BOT;

  function xFor(h) { return LABEL_W + (h / axisMax) * BAR_W; }

  // Vertical grid lines at every 24 h
  const ticks = [];
  for (let t = 0; t <= axisMax; t += 24) ticks.push(t);

  const gridLines = ticks.map(t =>
    `<line x1="${xFor(t)}" y1="${PAD_TOP}" x2="${xFor(t)}" y2="${PAD_TOP + breaches.length * ROW_H}"
      stroke="${t === 0 ? '#ccc' : '#f0f0f0'}" stroke-width="1"/>`
  ).join('');

  const axisLabels = ticks.map(t =>
    `<text x="${xFor(t)}" y="${PAD_TOP + breaches.length * ROW_H + 14}"
      text-anchor="middle" font-family="'Fira Code', monospace" font-size="9.5" fill="#bbb">${t}h</text>`
  ).join('');

  // 48 h SLA target line — label centred above the line, inside the SVG
  const slaX    = xFor(SLA_HOURS);
  const slaLine = `
    <text x="${slaX}" y="${PAD_TOP - 10}" text-anchor="middle"
      font-family="'Fira Code', monospace" font-size="9" fill="#dc2626" font-weight="500">48h SLA</text>
    <line x1="${slaX}" y1="${PAD_TOP - 4}" x2="${slaX}" y2="${PAD_TOP + breaches.length * ROW_H}"
      stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 3"/>`;

  // Horizontal bars (one per breach, y = row position, width = hours)
  const bars = breaches.map((b, i) => {
    const rowY = PAD_TOP + i * ROW_H;
    const barY = rowY + (ROW_H - BAR_H) / 2;
    const bw   = (b.dur.totalH / axisMax) * BAR_W;
    const fill = '#dc2626';
    const name = b.contract.name.length > 18 ? b.contract.name.slice(0, 17) + '…' : b.contract.name;
    return `
      <text x="${LABEL_W - 8}" y="${barY + BAR_H - 2}" text-anchor="end"
        font-family="'Inter', sans-serif" font-size="11" fill="#444">${name}</text>
      <text x="${LABEL_W - 8}" y="${barY - 1}" text-anchor="end"
        font-family="'Inter', sans-serif" font-size="9" fill="#ccc">T${b.turnIdx + 1}</text>
      <rect x="${LABEL_W}" y="${barY}" width="${bw}" height="${BAR_H}" rx="2"
        fill="${fill}" opacity="0.8"/>
      <text x="${LABEL_W + bw + 5}" y="${barY + BAR_H - 2}"
        font-family="'Fira Code', monospace" font-size="10" fill="${fill}">${b.dur.totalH}h</text>`;
  }).join('');

  const svg = `<svg width="${totalW}" height="${totalH}" xmlns="http://www.w3.org/2000/svg">
    ${gridLines}
    ${bars}
    ${slaLine}
    ${axisLabels}
  </svg>`;

  document.getElementById('chart').innerHTML = svg;
}

// ─────────────────────────────────────────────────────
//  Breach list
// ─────────────────────────────────────────────────────
function renderBreachList(breaches) {
  const el = document.getElementById('breach-list');
  if (!breaches.length) {
    el.innerHTML = '<div class="loading">No SLA breaches found.</div>';
    return;
  }

  el.innerHTML = breaches.map(b => {
    const { contract, turn, turnIdx, dur } = b;
    const reqs = requestsForTurn(contract.name, turn.sentAt, turn.returnedAt);
    const sentBy = turn.sentBy || '—';

    const nudgesHTML = reqs.length
      ? `<div class="nudge-list">${reqs.map(r => `
          <div class="nudge-item">
            <span class="nudge-dt">${r.dt}</span>
            <span class="nudge-who">${r.requester}</span>
            <span class="nudge-note">
              <span class="nudge-tag ${tagClass(r.type)}">${tagLabel(r.type)}</span>${r.note}
            </span>
          </div>`).join('')}</div>`
      : '';

    const durCls = dur.totalH > SLA_HOURS ? '' : 'warn';

    return `
      <div class="breach-item">
        <div class="breach-top">
          <div>
            <div class="breach-name">${contract.name}
              <span style="font-size:10.5px;font-weight:400;color:var(--txt-3);margin-left:6px">Turn ${turnIdx + 1}</span>
            </div>
            <div class="breach-sub">${contract.counterparty}${sentBy !== '—' ? ` · sent by ${sentBy}` : ''}</div>
          </div>
          <div>
            <span class="breach-ts">${turn.sentAt || turn.sentToElaine}</span>
            <span class="breach-ts-label">sent to Elaine</span>
          </div>
          <div>
            <span class="breach-ts">${turn.returnedAt || turn.returnedDate || '—'}</span>
            <span class="breach-ts-label">returned</span>
          </div>
          <div class="dur-badge">
            <span class="dur-num ${durCls}">${dur.d}</span><span class="dur-unit">d</span>
            <span class="dur-hours">${dur.totalH}h</span>
          </div>
        </div>
        ${nudgesHTML}
      </div>`;
  }).join('');
}

// ─────────────────────────────────────────────────────
//  Stats
// ─────────────────────────────────────────────────────
function renderStats(breaches, allTurns) {
  const completed = allTurns.filter(t => t.returnedDate);
  const pct = completed.length ? Math.round(breaches.length / completed.length * 100) : 0;
  const avgOver = breaches.length
    ? Math.round(breaches.reduce((s, b) => s + (b.dur.totalH - SLA_HOURS), 0) / breaches.length)
    : 0;
  const contracts = new Set(breaches.map(b => b.contract.name));

  const nudgedTurns = breaches.filter(b =>
    requestsForTurn(b.contract.name, b.turn.sentAt, b.turn.returnedAt).length > 0
  ).length;

  // Breaches where the turn was sent to Elaine in the last 2 weeks of March (18 Mar – 31 Mar)
  const lateMarchStart = new Date('2026-03-18T00:00:00Z');
  const lateMarchEnd   = new Date('2026-04-01T00:00:00Z');
  const lateMarchBreaches = breaches.filter(b => {
    const d = new Date(b.turn.sentToElaine);
    return d >= lateMarchStart && d < lateMarchEnd;
  });
  const lateMarchPct = breaches.length
    ? Math.round(lateMarchBreaches.length / breaches.length * 100)
    : 0;

  document.getElementById('stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-val red">${breaches.length}</div>
      <div class="stat-label">turns breached SLA</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${contracts.size}</div>
      <div class="stat-label">contracts affected</div>
    </div>
    <div class="stat-card">
      <div class="stat-val warn">${pct}%</div>
      <div class="stat-label">of completed turns</div>
    </div>

    <div class="stat-card">
      <div class="stat-val">${nudgedTurns}</div>
      <div class="stat-label">turns had Slack chases</div>
    </div>
    <div class="stat-card">
      <div class="stat-val warn">${lateMarchPct}%</div>
      <div class="stat-label">of breaches in late Mar (18–31)</div>
    </div>`;
}

// ─────────────────────────────────────────────────────
//  Main
// ─────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('/api/contracts');
    if (res.ok) {
      const { contracts: live } = await res.json();
      if (live && live.length) {
        CONTRACTS.length = 0;
        for (const c of live) CONTRACTS.push(c);
      }
    }
  } catch(e) { /* keep seed data */ }

  const allTurns = CONTRACTS.flatMap(c => c.turns);

  // Collect all breaching (closed) turns, sorted longest first
  const breaches = [];
  CONTRACTS.forEach(contract => {
    contract.turns.forEach((turn, turnIdx) => {
      const dur = durationFor(turn);
      if (dur && dur.totalH > SLA_HOURS) {
        breaches.push({ contract, turn, turnIdx, dur });
      }
    });
  });
  breaches.sort((a, b) => b.dur.totalH - a.dur.totalH);

  renderStats(breaches, allTurns);
  renderWoWChart(breaches);
  renderChart(breaches);
  renderBreachList(breaches);
}

init();
</script>
</body>
</html>
