<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elaine Turnaround — Granola</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --txt:    #111;
  --txt-2:  #888;
  --txt-3:  #bbb;
  --line:   #ebebeb;
  --sub-bg: #fafafa;
  --good:   #16a34a;
  --warn:   #ca8a04;
  --bad:    #dc2626;
  --font:   'Inter', sans-serif;
  --mono:   'Fira Code', monospace;
}

html, body {
  font-family: var(--font);
  background: #fff;
  color: var(--txt);
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
}

.page {
  max-width: 700px;
  margin: 0 auto;
  padding: 56px 24px 80px;
}

/* ── Header ─────────────────── */
.meta {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 40px;
}
.meta-left h1 { font-size: 15px; font-weight: 500; letter-spacing: -0.2px; }
.meta-left p  { font-size: 12px; color: var(--txt-2); margin-top: 3px; }
.meta-right   { font-family: var(--mono); text-align: right; }
.avg-num      { font-size: 28px; font-weight: 400; letter-spacing: -1px; line-height: 1; }
.avg-num span { font-size: 13px; color: var(--txt-2); margin-left: 2px; }
.avg-label    { font-size: 11px; color: var(--txt-3); margin-top: 3px; }

/* ── Column headers ─────────── */
.col-headers {
  display: grid;
  grid-template-columns: 1fr 130px 130px 80px;
  padding: 0 0 10px;
  border-bottom: 1px solid var(--line);
  font-size: 11px;
  font-weight: 500;
  color: var(--txt-3);
  letter-spacing: 0.2px;
}
.col-headers span:not(:first-child) { text-align: right; }

/* ── Contract row ─────────── */
.contract { border-bottom: 1px solid var(--line); }
.contract:last-child { border-bottom: none; }

.contract-row {
  display: grid;
  grid-template-columns: 1fr 130px 130px 80px;
  align-items: center;
  padding: 13px 0;
  cursor: pointer;
  transition: opacity 0.1s;
}
.contract-row:hover { opacity: 0.7; }

.ct-name-wrap { display: flex; align-items: center; gap: 8px; }

.chevron {
  width: 14px; height: 14px; flex-shrink: 0;
  color: var(--txt-3);
  transition: transform 0.18s ease;
}
.contract.open .chevron { transform: rotate(90deg); }

.ct-name  { font-size: 13px; font-weight: 500; }
.ct-party { font-size: 11.5px; color: var(--txt-2); margin-top: 2px; }

.turn-count { font-size: 11.5px; color: var(--txt-2); text-align: right; }
.turn-count strong { color: var(--txt); font-weight: 500; }

.avg-days {
  font-family: var(--mono);
  font-size: 19px; font-weight: 400; letter-spacing: -0.5px;
  text-align: right;
}
.avg-days .unit { font-size: 11px; color: var(--txt-3); }
.avg-days.fast    { color: var(--good); }
.avg-days.warn    { color: var(--warn); }
.avg-days.slow    { color: var(--bad);  }
.avg-days.pending { color: var(--txt-3); font-size: 14px; }

/* ── Turns ─────────────────── */
.turns {
  display: none;
  background: var(--sub-bg);
  border-top: 1px solid var(--line);
  padding: 2px 0;
}
.contract.open .turns { display: block; }

.turn-row {
  border-bottom: 1px solid var(--line);
}
.turn-row:last-child { border-bottom: none; }
.turn-main {
  display: grid;
  grid-template-columns: 1fr 130px 130px 80px;
  align-items: center;
  padding: 10px 0 10px 22px;
  cursor: pointer;
}
.turn-main:hover { background: rgba(0,0,0,0.015); }
.turn-row.has-requests .turn-main { padding-bottom: 7px; }

.turn-label {
  font-size: 11px; font-weight: 500;
  color: var(--txt-3);
  text-transform: uppercase; letter-spacing: 0.3px;
}
.turn-people {
  display: flex; align-items: center; gap: 4px;
  font-size: 11.5px; color: var(--txt-2); margin-top: 3px;
}
.turn-person { font-weight: 500; color: var(--txt); }
.turn-arrow  { color: var(--txt-3); font-size: 10px; }
.turn-elaine { font-weight: 500; color: #6366f1; }
.ts-val      { font-family: var(--mono); font-size: 11.5px; color: var(--txt-2); text-align: right; display: block; }
.ts-sub      { font-size: 10.5px; color: var(--txt-3); text-align: right; display: block; margin-top: 1px; }
.turn-trigger { font-size: 10.5px; color: var(--txt-3); margin-top: 2px; }

.date-val     { font-size: 12.5px; color: var(--txt-2); text-align: right; display: block; }
.pending-dash { font-size: 13px; color: var(--txt-3); text-align: right; display: block; }

.days-wrap {
  display: flex; align-items: baseline;
  justify-content: flex-end; gap: 2px;
}
.days-num {
  font-family: var(--mono); font-size: 19px;
  font-weight: 400; letter-spacing: -0.5px; line-height: 1;
}
.days-unit { font-family: var(--mono); font-size: 11px; color: var(--txt-3); }
.days-num.fast { color: var(--good); }
.days-num.warn { color: var(--warn); }
.days-num.slow { color: var(--bad);  }
.dur-hours { font-family: var(--mono); font-size: 10px; color: var(--txt-3); margin-left: 3px; }
.avg-hours { font-family: var(--mono); font-size: 10px; color: var(--txt-3); margin-left: 2px; }
.dash { font-family: var(--mono); font-size: 14px; color: var(--txt-3); text-align: right; display: block; }

/* ── Filters ────────────────── */
.filter-bar {
  display: flex; align-items: center; flex-wrap: wrap;
  gap: 6px; padding: 14px 0 18px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 4px;
}
.filter-label {
  font-size: 11px; color: var(--txt-3); text-transform: uppercase;
  letter-spacing: 0.4px; font-weight: 500; margin-right: 4px;
}
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 20px; cursor: pointer;
  font-size: 12px; font-weight: 500;
  border: 1.5px solid var(--line); color: var(--txt-2);
  background: transparent; user-select: none;
  transition: border-color 0.12s, background 0.12s, color 0.12s;
}
.chip:hover { border-color: #94a3b8; color: var(--txt); }
.chip.active {
  background: var(--txt); border-color: var(--txt); color: var(--bg);
}
.chip-count {
  font-size: 10px; opacity: 0.65; font-weight: 400;
}
.filter-clear {
  font-size: 11px; color: var(--txt-3); cursor: pointer;
  padding: 4px 6px; margin-left: 2px;
  border-radius: 4px; transition: color 0.1s;
}
.filter-clear:hover { color: var(--txt); }
.filter-clear.hidden { display: none; }

/* ── Requests in turns ────────── */
.req-list { padding: 0 0 10px 22px; }
.req-item {
  display: grid;
  grid-template-columns: 72px 58px 66px 1fr;
  align-items: baseline;
  gap: 6px;
  padding: 5px 0;
  border-top: 1px dotted var(--line);
}
.req-item-dt   { font-family: var(--mono); font-size: 10px; color: var(--txt-3); }
.req-item-who  { font-size: 11px; font-weight: 500; color: var(--txt); }
.req-item-type {
  display: inline-block; font-size: 10px; font-weight: 500;
  padding: 1px 6px; border-radius: 8px; text-align: center;
}
.req-item-type.prio  { background: #fef3c7; color: #92400e; }
.req-item-type.guide { background: #ede9fe; color: #5b21b6; }
.req-item-type.call  { background: #dcfce7; color: #166534; }
.req-item-type.other { background: #f1f5f9; color: #475569; }
.req-item-note { color: var(--txt-2); font-size: 10.5px; }
.req-badge {
  display: inline-flex; align-items: center;
  font-size: 9.5px; font-weight: 500;
  padding: 1px 6px; border-radius: 8px;
  margin-left: 5px; vertical-align: middle;
}
.req-badge.prio  { background: #fef3c7; color: #92400e; }
.req-badge.guide { background: #ede9fe; color: #5b21b6; }
.req-badge.call  { background: #dcfce7; color: #166534; }
.req-badge.other { background: #f1f5f9; color: #475569; }

/* ── Footer ─────────────────── */
.footer-row {
  display: grid;
  grid-template-columns: 1fr 130px 130px 80px;
  padding: 12px 0 0;
  border-top: 1px solid var(--line);
  font-size: 12px; color: var(--txt-3);
}
.footer-row .avg-days { font-size: 15px; }
</style>

// Parse "9 Apr 14:58" → Date in 2026
function parseTs(s) {
  if (!s) return null;
  try { return new Date(s + " 2026"); } catch(e) { return null; }
}
// Returns fractional hours between two timestamp strings
function hoursBetweenTs(sentAt, returnedAt) {
  const a = parseTs(sentAt), b = parseTs(returnedAt);
  if (!a || !b) return null;
  return (b - a) / 3600000;
}
// Fallback: days from date strings
function daysBetween(a, b) {
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}
// Returns {d, h} for a turn — using precise timestamps if available
function durationFor(turn) {
  if (!turn.returnedDate) return null;
  const hrs = hoursBetweenTs(turn.sentAt, turn.returnedAt);
  if (hrs !== null && hrs >= 0) {
    return { d: Math.floor(hrs / 24), h: Math.round(hrs % 24), totalH: Math.round(hrs) };
  }
  // fallback to date-only
  const d = daysBetween(turn.sentToElaine, turn.returnedDate);
  return { d, h: null, totalH: d * 24 };
}
function daysFor(turn) {
  if (!turn.returnedDate) return null;
  const dur = durationFor(turn);
  return dur ? dur.d + dur.h / 24 : null;
}
function daysClass(d) {
  return d <= 3 ? "fast" : d <= 7 ? "warn" : "slow";
}
function fmtDate(s) {
  return new Date(s).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
}
function avgOf(nums) {
  if (!nums.length) return null;
  return nums.reduce((s,v)=>s+v,0) / nums.length;
}
function avgHoursFor(turns) {
  const hrs = turns.map(t => {
    const dur = durationFor(t);
    return dur ? dur.totalH : null;
  }).filter(h => h !== null);
  if (!hrs.length) return null;
  return hrs.reduce((s,v)=>s+v,0) / hrs.length;
}
// Format average: "1.2d (29h)"
function fmtAvg(turns) {
  const avgH = avgHoursFor(turns);
  if (avgH === null) return null;
  const d = (avgH / 24).toFixed(1);
  const h = Math.round(avgH);
  return { d, h, cls: daysClass(avgH / 24) };
}
function contractAvg(c) {
  return fmtAvg(c.turns.filter(t => t.returnedDate));
}
function globalAvg() {
  return fmtAvg(CONTRACTS.flatMap(c => c.turns).filter(t => t.returnedDate));
}
// Render a duration badge: "2d (38h)"
function durHTML(dur, extraCls) {
  const cls = extraCls || daysClass(dur.totalH / 24);
  const hStr = `<span class="dur-hours">(${dur.totalH}h)</span>`;
  return `<div class="days-wrap"><span class="days-num ${cls}">${dur.d}</span><span class="days-unit">d</span>${hStr}</div>`;
}
function avgHTML(avg, extraCls) {
  const cls = extraCls || avg.cls;
  return `${avg.d}<span class="unit">d</span><span class="avg-hours">(${avg.h}h)</span>`;
}

// ── Request helpers ───────────────────────────────────
function reqTypeClass(type) {
  if (/prioriti/i.test(type)) return "prio";
  if (/guidance/i.test(type)) return "guide";
  if (/legal call/i.test(type)) return "call";
  return "other";
}
function reqTypeLbl(type) {
  if (/prioriti/i.test(type)) return "Chase";
  if (/guidance/i.test(type)) return "Guidance";
  if (/legal call/i.test(type)) return "Call";
  return type;
}
// Returns REQUESTS that landed while this turn was open
function requestsForTurn(contractName, sentAt, returnedAt) {
  const tStart = parseTs(sentAt);
  // If turn still open, use far-future sentinel so all requests after start are included
  const tEnd = returnedAt ? parseTs(returnedAt) : new Date(32503680000000);
  if (!tStart) return [];
  const cLower = contractName.toLowerCase();
  return REQUESTS.filter(r => {
    if (!r.contracts.some(cn => cn.toLowerCase() === cLower)) return false;
    const rDt = parseTs(r.dt);
    return rDt && rDt >= tStart && rDt <= tEnd;
  });
}
// Summarise badge label for a set of requests
function reqBadgeHTML(reqs) {
  if (!reqs.length) return "";
  // Count by type for multi-type situations
  const hasPrio  = reqs.some(r => /prioriti/i.test(r.type));
  const hasGuide = reqs.some(r => /guidance/i.test(r.type));
  const hasCall  = reqs.some(r => /legal call/i.test(r.type));
  const cls = hasPrio ? "prio" : hasGuide ? "guide" : hasCall ? "call" : "other";
  return `<span class="req-badge ${cls}">${reqs.length} follow-up${reqs.length > 1 ? "s" : ""}</span>`;
}
// Render an inline request list below a turn
function reqListHTML(reqs) {
  return `<div class="req-list">${reqs.map(r =>
    `<div class="req-item">
      <span class="req-item-dt">${r.dt}</span>
      <span class="req-item-who">${r.requester}</span>
      <span class="req-item-type ${reqTypeClass(r.type)}">${reqTypeLbl(r.type)}</span>
      <span class="req-item-note">${r.note}</span>
    </div>`).join("")}</div>`;
}

// ─────────────────────────────────────────────────────
//  Render
// ─────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────
//  Filter state
// ─────────────────────────────────────────────────────
const activeFilters = new Set();

// Canonical type groups — maps display label → array of counterparty values that match
const TYPE_GROUPS = [
  { label: "Order Form",  match: c => /order form/i.test(c.counterparty) },
  { label: "MSA",         match: c => /\bMSA\b/i.test(c.counterparty) },
  { label: "MNDA",        match: c => /\bMNDA\b/i.test(c.counterparty) },
  { label: "POC / Pilot", match: c => /poc|pilot|eval/i.test(c.counterparty) },
  { label: "Other",       match: c => !/order form|MSA|MNDA|poc|pilot|eval/i.test(c.counterparty) },
];

function filteredContracts() {
  if (!activeFilters.size) return CONTRACTS;
  return CONTRACTS.filter(c =>
    TYPE_GROUPS.filter(g => activeFilters.has(g.label)).some(g => g.match(c))
  );
}

function buildFilters() {
  const bar = document.getElementById("filter-bar");
  const clearBtn = document.getElementById("filter-clear");

  // Insert chips after the label (before clear button)
  TYPE_GROUPS.forEach(group => {
    const count = CONTRACTS.filter(c => group.match(c)).length;
    const chip = document.createElement("span");
    chip.className = "chip";
    chip.dataset.group = group.label;
    chip.innerHTML = `${group.label}<span class="chip-count">${count}</span>`;
    chip.addEventListener("click", () => {
      if (activeFilters.has(group.label)) {
        activeFilters.delete(group.label);
        chip.classList.remove("active");
      } else {
        activeFilters.add(group.label);
        chip.classList.add("active");
      }
      clearBtn.classList.toggle("hidden", activeFilters.size === 0);
      render();
    });
    // Insert before clear button
    bar.insertBefore(chip, clearBtn);
  });

  clearBtn.addEventListener("click", () => {
    activeFilters.clear();
    bar.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    clearBtn.classList.add("hidden");
    render();
  });
}

function render() {
  const contracts = filteredContracts();
  const list = document.getElementById("list");
  list.innerHTML = "";

  contracts.forEach(contract => {
    const a          = contractAvg(contract);
    const totalTurns = contract.turns.length;

    const turnsHTML = contract.turns.map((turn, ti) => {
      const sentBy     = turn.sentBy     || "";
      const returnedTo = turn.returnedTo || "";
      const sentAt     = turn.sentAt     || fmtDate(turn.sentToElaine);
      const returnedAt = turn.returnedAt || (turn.returnedDate ? fmtDate(turn.returnedDate) : null);
      const reqs       = requestsForTurn(contract.name, turn.sentAt, turn.returnedAt);

      const peopleHTML = `
        <div class="turn-people">
          <span class="turn-person">${sentBy}</span>
          <span class="turn-arrow">›</span>
          <span class="turn-elaine">Elaine</span>
          ${returnedTo ? `<span class="turn-arrow">›</span><span class="turn-person">${returnedTo}</span>` : ""}
        </div>`;

      const dur = durationFor(turn);
      return `
        <div class="turn-row${reqs.length ? " has-requests" : ""}">
          <div class="turn-main">
            <div>
              <div class="turn-label">Turn ${ti + 1}${reqBadgeHTML(reqs)}</div>
              ${peopleHTML}
            </div>
            <span class="ts-val">${sentAt}</span>
            <span class="${returnedAt ? "ts-val" : "pending-dash"}">
              ${returnedAt || "—"}
            </span>
            ${dur ? durHTML(dur) : `<span class="dash">—</span>`}
          </div>
          ${reqs.length ? reqListHTML(reqs) : ""}
        </div>`;
    }).join("");

    const el = document.createElement("div");
    el.className = "contract";
    el.innerHTML = `
      <div class="contract-row">
        <div class="ct-name-wrap">
          <svg class="chevron" viewBox="0 0 14 14" fill="none">
            <path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <div>
            <div class="ct-name">${contract.name}</div>
            <div class="ct-party">${contract.counterparty}</div>
          </div>
        </div>
        <div class="turn-count" style="text-align:right">
          <strong>${totalTurns}</strong> turn${totalTurns !== 1 ? "s" : ""}
        </div>
        <div></div>
        <div class="avg-days ${a != null ? a.cls : 'pending'}">
          ${a != null ? avgHTML(a) : "—"}
        </div>
      </div>
      <div class="turns">${turnsHTML}</div>`;

    el.querySelector(".contract-row").addEventListener("click", () => el.classList.toggle("open"));
    list.appendChild(el);
  });

  // Footer
  const completedTurns = contracts.flatMap(c => c.turns).filter(t => t.returnedDate);
  const a = fmtAvg(completedTurns);
  document.getElementById("footer").innerHTML = `
    <span>Avg · ${completedTurns.length} turns completed${activeFilters.size ? " (filtered)" : ""}</span>
    <span></span><span></span>
    <div class="avg-days ${a != null ? a.cls : "pending"}">
      ${a != null ? avgHTML(a) : "—"}
    </div>`;

  // Global avg (also filtered)
  document.getElementById("avg-num").innerHTML = a != null
    ? `${a.d}<span>d</span><span style="font-size:14px;color:var(--txt-3);margin-left:4px">(${a.h}h)</span>`
    : "—";
  document.getElementById("avg-label").textContent =
    `avg · ${completedTurns.length} turn${completedTurns.length !== 1 ? "s" : ""} completed`;
}

buildFilters();
render();
</script>
</body>
</html>
