<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live — Legal velocity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --txt: #111; --txt2: #6b6b6b; --line: #ebebeb; --bg2: #fafafa;
  --w: #2563eb; --s: #611f69; --f: 'Inter', system-ui, sans-serif; --mono: 'IBM Plex Mono', monospace;
}
html, body { font-family: var(--f); background: #fff; color: var(--txt); font-size: 14px; -webkit-font-smoothing: antialiased; }
.wrap { max-width: 700px; margin: 0 auto; padding: 48px 20px 80px; }
header { margin-bottom: 24px; }
h1 { font-size: 18px; font-weight: 500; letter-spacing: -0.3px; }
header p { color: var(--txt2); font-size: 13px; margin-top: 6px; line-height: 1.5; }
nav { font-size: 12px; margin-top: 14px; }
nav a { color: var(--txt2); text-decoration: none; margin-right: 16px; }
nav a:hover { color: var(--txt); text-decoration: underline; }
nav a.on { color: var(--txt); font-weight: 500; }
#status { font-size: 11px; color: #999; font-family: var(--mono); margin-bottom: 20px; line-height: 1.5; }
.group {
  border: 1px solid var(--line);
  border-radius: 10px;
  margin-bottom: 16px;
  overflow: hidden;
  background: #fff;
}
.group-h {
  background: var(--bg2);
  padding: 10px 14px 11px;
  font-size: 14px; font-weight: 500;
  border-bottom: 1px solid var(--line);
}
.sub { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: #9ca3af; padding: 8px 14px 4px; }
.sub.ap { color: #1d4ed8; }
.sub.sl { color: #5b21b6; }
.row2 {
  display: grid; grid-template-columns: 70px 1fr;
  gap: 10px; padding: 9px 14px 10px; border-top: 1px solid var(--line); align-items: start; font-size: 13px;
}
.time { font-family: var(--mono); font-size: 10px; color: #9ca3af; }
.badge { display: inline-block; font-size: 8px; font-weight: 600; text-transform: uppercase; margin-bottom: 3px; color: #64748b; }
.t { line-height: 1.4; }
.meta { font-size: 11.5px; color: var(--txt2); margin-top: 2px; }
.empty { color: #9ca3af; font-size: 13px; padding: 28px 0; }
.err { color: #b91c1c; font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Live</h1>
    <p>Last <strong>7 days</strong>, by contract. <strong>Approvals</strong> = one line per <em>turn</em>: sent to legal → returned (or still open). <strong>Slack</strong> matches the same deal names. Unlinked Slack is at the bottom.</p>
    <nav>
      <a class="on" href="/">Live</a>
      <a href="/history">History import</a>
      <a href="/breach">Breach</a>
      <a href="/queue" title="Merged queue table">Queue</a>
    </nav>
  </header>
  <p id="status">Loading…</p>
  <div id="log"></div>
</div>
<script>
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtTime(at) {
  return new Date(at).toLocaleString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
}
function renderRows(items, isSlack) {
  if (!items || !items.length) return '<p class="meta" style="padding:6px 14px 10px">None in this group.</p>';
  return items.map((x) => {
    const sub = (!isSlack && x.pairSubtitle) ? '<div class="meta">' + esc(x.pairSubtitle) + '</div>' : '';
    const party = x.meta ? '<div class="meta">' + esc(x.meta) + '</div>' : '';
    return `<div class="row2">
      <div class="time">${esc(fmtTime(x.at))}</div>
      <div>
        <span class="badge">${isSlack ? 'Slack' : 'Juro'}</span>
        <div class="t">${esc(x.title || '')}</div>
        ${sub}
        ${party}
      </div>
    </div>`;
  }).join('');
}
async function load() {
  const st = document.getElementById('status');
  const log = document.getElementById('log');
  try {
    const r = await fetch('/api/live-log');
    if (!r.ok) throw new Error('API ' + r.status);
    const d = await r.json();
    const t = d.counts || {};
    const tw = t.webhook | 0;
    const ts = t.slack | 0;
    const line = tw + ts
      ? `${tw} approval turn(s), ${ts} Slack` + (d.groups ? `, ${d.groups.length} group(s)` : '')
      : 'No activity in the window';
    st.textContent = line + '.';
    if (d.slackLastSynced) st.textContent += ' Slack channel sync: ' + new Date(d.slackLastSynced).toLocaleString();
    const gr = d.groups;
    if (!gr || !gr.length) {
      log.innerHTML = '<div class="empty">No rows yet, or group API empty.</div>';
      return;
    }
    log.innerHTML = gr.map((g) => {
      return `<div class="group" data-gid="${esc(g.id || '')}">
        <div class="group-h">${esc(g.label || '—')}</div>
        <div class="sub ap">Approvals</div>
        ${renderRows(g.webhooks, false)}
        <div class="sub sl">Slack</div>
        ${renderRows(g.slack, true)}
      </div>`;
    }).join('');
  } catch (e) {
    st.textContent = '';
    log.innerHTML = '<p class="err">Could not load /api/live-log</p>';
  }
}
load();
setInterval(load, 30 * 1000);
</script>
</body>
</html>
